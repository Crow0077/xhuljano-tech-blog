{{- define "main" }}
<style>
#hero-wrap{width:100%;height:600px;background:#020208;position:relative;overflow:hidden;cursor:grab}
#hero-wrap:active{cursor:grabbing}
#hero-wrap canvas{display:block;position:absolute;top:0;left:0}
#hero-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;pointer-events:none}
#hero-text h1{font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;font-size:2.8rem;color:rgba(255,255,255,0.9);margin:0;letter-spacing:-1px;text-shadow:0 0 40px rgba(255,180,50,0.2),0 0 80px rgba(255,180,50,0.08)}
#hero-text p{font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;font-size:0.85rem;color:rgba(160,170,200,0.6);margin-top:12px;letter-spacing:3px;text-transform:uppercase}
</style>
<div id="hero-wrap">
  <div id="hero-text"><h1>Building with AI Agents</h1><p>Cloud Engineering Student · AI Agents · MCP · Homelab</p></div>
</div>
<script>
(function(){
const wp=document.getElementById("hero-wrap"),cv=document.createElement("canvas"),x=cv.getContext("2d");
wp.appendChild(cv);const HH=600;
let W,H,dpr,time=0,dt=0,lt=0;
let camDist=22,camLat=.35,camLon=0,cd=22,cl=.35,clo=0;
let mouse={x:0,y:0,down:!1,px:0,py:0},hovered=-1;
let stars=[],st=[];
const planets=[{name:"Mercury",c:"#b5b5b5",o:3,s:.08,sp:4.15,r:!1},{name:"Venus",c:"#e8cda0",o:4,s:.18,sp:3,r:!1},{name:"Earth",c:"#5599dd",o:5.2,s:.19,sp:2.4,r:!1},{name:"Mars",c:"#dd6644",o:6.5,s:.13,sp:1.9,r:!1},{name:"Jupiter",c:"#d4a574",o:9,s:.7,sp:1.05,r:!1},{name:"Saturn",c:"#e8d5a3",o:11.5,s:.58,sp:.78,r:!0},{name:"Uranus",c:"#8cd4d4",o:14,s:.38,sp:.55,r:!1},{name:"Neptune",c:"#4466dd",o:16,s:.36,sp:.44,r:!1}];
const ps=planets.map(p=>({angle:Math.random()*Math.PI*2,ox:0,oy:0,oz:0}));

function rY(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c]}
function rX(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c]}
function prj(wx,wy,wz){
  const cx=cd*Math.cos(cl)*Math.sin(clo),cy=cd*Math.sin(cl),cz=cd*Math.cos(cl)*Math.cos(clo);
  const fx=-cx,fy=-cy,fz=-cz,fm=Math.sqrt(fx*fx+fy*fy+fz*fz),fwx=fx/fm,fwy=fy/fm,fwz=fz/fm;
  let rx=1*fwz-0*fwy,ry=0*fwx-0*fwz,rz=0*fwy-1*fwx;
  const rmag=Math.sqrt(rx*rx+ry*ry+rz*rz);rx/=rmag;ry/=rmag;rz/=rmag;
  const ux=fwy*rz-fwz*ry,uy=fwz*rx-fwx*rz,uz=fwx*ry-fwy*rx;
  const dx=wx-cx,dy=wy-cy,dz=wz-cz;
  const sx=dx*rx+dy*ry+dz*rz,sy=dx*ux+dy*uy+dz*uz,sz=dx*fwx+dy*fwy+dz*fwz;
  if(sz<.1)return null;const sc=150/sz;
  return{x:W/2+sx*sc,y:H/2-sy*sc,z:sz,sc:sc};
}

for(let i=0;i<400;i++){const a=Math.random()*Math.PI*2,b=Math.acos(2*Math.random()-1),r=35+Math.random()*65;stars.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,sz:.3+Math.random()*1.5,br:.4+Math.random()*.6});st.push({sp:.5+Math.random()*3,ph:Math.random()*Math.PI*2})}

function lg(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,Math.round(r+255*amt))},${Math.min(255,Math.round(g+255*amt))},${Math.min(255,Math.round(b+255*amt))})`}
function dk(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.max(0,Math.round(r*(1-amt)))},${Math.max(0,Math.round(g*(1-amt)))},${Math.max(0,Math.round(b*(1-amt)))})`}

function drawSun(){
  const p=prj(0,0,0);if(!p)return;
  const r=Math.max(p.sc*.75,18);
  for(let i=4;i>=0;i--){const gr=Math.round(r+r*.3*i),g=x.createRadialGradient(p.x,p.y,0,p.x,p.y,gr);g.addColorStop(0,`rgba(255,255,200,${.15-i*.025})`);g.addColorStop(.4,`rgba(255,180,50,${.08-i*.012})`);g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,gr,0,Math.PI*2);x.fill()}
  const g2=x.createRadialGradient(p.x-r*.3,p.y-r*.3,r*.05,p.x,p.y,r);g2.addColorStop(0,'#fffde0');g2.addColorStop(.25,'#ffe08a');g2.addColorStop(.6,'#ff9d2e');g2.addColorStop(1,'#cc5500');x.fillStyle=g2;x.beginPath();x.arc(p.x,p.y,r,0,Math.PI*2);x.fill()
}

function dPlanet(px,py,pz,r,hx,rings){
  const p=prj(px,py,pz);if(!p)return null;
  const sr=Math.max(p.sc*r,1.5);
  const g=x.createRadialGradient(p.x-sr*.3,p.y-sr*.3,sr*.05,p.x,p.y,sr);g.addColorStop(0,lg(hx,.4));g.addColorStop(.6,hx);g.addColorStop(1,dk(hx,.5));x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,sr,0,Math.PI*2);x.fill();
  x.fillStyle='rgba(0,0,0,.25)';x.beginPath();x.arc(p.x+sr*.15,p.y,sr*.85,-Math.PI*.5,Math.PI*.5);x.fill();
  if(rings){x.save();x.translate(p.x,p.y);x.scale(1,.28);x.rotate(-.4);x.strokeStyle='rgba(210,190,150,.5)';x.lineWidth=sr*.18;x.beginPath();x.ellipse(0,0,sr*2.3,sr*2.3,0,Math.PI*.7,Math.PI*1.7);x.stroke();x.strokeStyle='rgba(190,170,130,.35)';x.lineWidth=sr*.35;x.beginPath();x.ellipse(0,0,sr*1.8,sr*1.8,0,Math.PI*.6,Math.PI*1.8);x.stroke();x.restore()}
  return{x:p.x,y:p.y,r:sr}
}

function rs(){dpr=Math.min(devicePixelRatio||1,2);W=wp.offsetWidth;H=HH;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
rs();addEventListener("resize",rs);

function fr(now){
  dt=lt?Math.min((now-lt)/1e3,.1):.016;lt=now;time+=dt;
  camDist+=(cd-camDist)*Math.min(dt*5,1);camLat+=(cl-camLat)*Math.min(dt*8,1);camLon+=(clo-camLon)*Math.min(dt*8,1);
  x.fillStyle='#020208';x.fillRect(0,0,W,H);
  for(let i=0;i<stars.length;i++){const s=stars[i],p=prj(s.x,s.y,s.z);if(!p)continue;const tw=s.br*(.7+.3*Math.sin(time*st[i].sp+st[i].ph)),a=tw*.8;x.fillStyle=`rgba(200,210,255,${a})`;x.beginPath();x.arc(p.x,p.y,Math.max(.3,s.sz*.8),0,Math.PI*2);x.fill()}
  for(const p of planets){x.strokeStyle='rgba(255,255,255,.04)';x.lineWidth=.5;x.beginPath();let f=!0;for(let a=0;a<=Math.PI*2;a+=.06){const pt=prj(Math.cos(a)*p.o,0,Math.sin(a)*p.o);if(!pt)continue;if(f){x.moveTo(pt.x,pt.y);f=!1}else x.lineTo(pt.x,pt.y)}x.stroke()}
  for(let i=0;i<planets.length;i++){ps[i].angle+=planets[i].sp*dt;ps[i].ox=Math.cos(ps[i].angle)*planets[i].o;ps[i].oz=Math.sin(ps[i].angle)*planets[i].o}
  drawSun();
  const scr=[];hovered=-1;let cdMin=50;
  for(let i=0;i<planets.length;i++){const r=dPlanet(ps[i].ox,ps[i].oy,ps[i].oz,planets[i].s,planets[i].c,planets[i].r);if(r){scr.push({i,x:r.x,y:r.y,r:r.r});if(i===2){const ma=time*5+ps[i].angle*3,dst=.35;dPlanet(ps[i].ox+Math.cos(ma)*dst,ps[i].oy,ps[i].oz+Math.sin(ma)*dst,.04,'#ddd',!1)}}}
  if(mouse.x>0&&mouse.y>0)for(const s of scr){const dx=mouse.x-s.x,dy=mouse.y-s.y,d=Math.sqrt(dx*dx+dy*dy);if(d<Math.max(s.r+10,24)&&d<cdMin){hovered=s.i;cdMin=d}}
  requestAnimationFrame(fr)
}

wp.addEventListener("mousedown",e=>{mouse.down=!0;mouse.px=e.clientX;mouse.py=e.clientY;e.preventDefault()});
wp.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY;if(mouse.down){clo+=(e.clientX-mouse.px)*.003;cl-=(e.clientY-mouse.py)*.003;cl=Math.max(-1.2,Math.min(1.2,cl));mouse.px=e.clientX;mouse.py=e.clientY}});
wp.addEventListener("mouseup",()=>{mouse.down=!1});
wp.addEventListener("mouseleave",()=>{mouse.down=!1;mouse.x=-1;mouse.y=-1});
wp.addEventListener("click",e=>{if(hovered>=0){const p=planets[hovered];cd=p.o*1.5;cl=.15}});
wp.addEventListener("dblclick",e=>{cd=22;cl=.35;clo=0;e.preventDefault()});
wp.addEventListener("wheel",e=>{e.preventDefault();cd=Math.max(5,Math.min(50,cd-e.deltaY*.02))},{passive:!1});
wp.addEventListener("touchstart",e=>{if(e.touches.length===1){mouse.down=!0;mouse.px=e.touches[0].clientX;mouse.py=e.touches[0].clientY;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}e.preventDefault()});
wp.addEventListener("touchmove",e=>{if(mouse.down&&e.touches.length===1){clo+=(e.touches[0].clientX-mouse.px)*.003;cl-=(e.touches[0].clientY-mouse.py)*.003;cl=Math.max(-1.2,Math.min(1.2,cl));mouse.px=e.touches[0].clientX;mouse.py=e.touches[0].clientY;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cd=Math.max(5,Math.min(50,22-(d-150)*.03))}e.preventDefault()},{passive:!1});
wp.addEventListener("touchend",()=>{mouse.down=!1});
requestAnimationFrame(fr);
})();
</script>

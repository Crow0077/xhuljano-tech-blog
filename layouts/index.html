{{- define "main" }}
<style>
#hero-wrap { width:100%; height:600px; background:#06060c; position:relative; overflow:hidden; cursor:crosshair; }
#hero-wrap canvas { display:block; }
#hero-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:10; pointer-events:none; }
#hero-text h1 { font-family:'SF Mono','Fira Code','JetBrains Mono',monospace; font-size:2.8rem; color:rgba(255,255,255,0.9); margin:0; letter-spacing:-1px; text-shadow:0 0 40px rgba(0,180,255,0.3),0 0 80px rgba(0,180,255,0.1); }
#hero-text p { font-family:'SF Mono','Fira Code','JetBrains Mono',monospace; font-size:0.85rem; color:rgba(160,170,200,0.6); margin-top:12px; letter-spacing:3px; text-transform:uppercase; }
</style>
<div id="hero-wrap"><div id="hero-text"><h1>Building with AI Agents</h1><p>Cloud Engineering Student · AI Agents · MCP · Homelab</p></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<script>
new p5(function(p){let W,H,flowField=[],particles=[],mouseTrail=[],geoShapes=[],time=0,cols,rows;const S=20,PC=400,GC=12;p.setup=function(){let w=document.getElementById('hero-wrap');W=w.offsetWidth;H=600;p.createCanvas(W,H).parent('hero-wrap');cols=Math.ceil(W/S)+1;rows=Math.ceil(H/S)+1;for(let y=0;y<rows;y++){flowField[y]=[];for(let x=0;x<cols;x++)flowField[y][x]=p.createVector(0,0)}for(let i=0;i<PC;i++)particles.push({x:p.random(W),y:p.random(H),vx:0,vy:0,life:p.random(60,200),maxLife:200,hue:p.random(190,250),size:p.random(1,3)});for(let i=0;i<GC;i++)geoShapes.push({x:p.random(W),y:p.random(H),r:p.random(40,120),sides:p.floor(p.random(3,8)),rotation:p.random(p.TWO_PI),rotSpeed:p.random(-0.005,0.005),hue:p.random(190,260),alpha:p.random(2,8),life:p.random(100,300),phase:p.random(p.TWO_PI)})};p.draw=function(){p.background(6,6,12);time+=0.005;for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){let a=p.noise(x*0.08,y*0.08,time*0.3)*p.TWO_PI*2;flowField[y][x].x=p.cos(a);flowField[y][x].y=p.sin(a)}for(let g of geoShapes){g.life--;if(g.life<=0){g.x=p.random(W);g.y=p.random(H);g.life=p.random(100,300);g.alpha=p.random(2,8)}g.rotation+=g.rotSpeed;let ps=1+0.15*p.sin(time*2+g.phase);p.push();p.translate(g.x,g.y);p.rotate(g.rotation);p.noFill();p.stroke(g.hue,120,200,g.alpha*0.4);p.strokeWeight(0.5);p.beginShape();for(let i=0;i<g.sides;i++){let a=(i/g.sides)*p.TWO_PI-p.HALF_PI;p.vertex(p.cos(a)*g.r*ps,p.sin(a)*g.r*ps)}p.endShape(p.CLOSE);p.pop()}if(p.mouseX>0&&p.mouseX<W&&p.mouseY>0&&p.mouseY<H){mouseTrail.push({x:p.mouseX,y:p.mouseY,life:30});if(mouseTrail.length>20)mouseTrail.shift()}for(let t of mouseTrail){t.life--;if(t.life>0){p.noStroke();p.fill(100,180,255,p.map(t.life,0,30,0,40));p.circle(t.x,t.y,3)}}for(let pt of particles){let c=p.floor(pt.x/S),r=p.floor(pt.y/S);c=p.constrain(c,0,cols-1);r=p.constrain(r,0,rows-1);let f=flowField[r][c];pt.vx+=f.x*0.1;pt.vy+=f.y*0.1;if(p.mouseX>0&&p.mouseX<W&&p.mouseY>0&&p.mouseY<H){let d=p.dist(p.mouseX,p.mouseY,pt.x,pt.y);if(d<200){let s=p.map(d,0,200,0.3,0);pt.vx+=(p.mouseX-pt.x)/d*s;pt.vy+=(p.mouseY-pt.y)/d*s}}pt.vx*=0.95;pt.vy*=0.95;pt.x+=pt.vx;pt.y+=pt.vy;if(pt.x<0)pt.x=W;if(pt.x>W)pt.x=0;if(pt.y<0)pt.y=H;if(pt.y>H)pt.y=0;pt.life--;if(pt.life<=0){pt.x=p.random(W);pt.y=p.random(H);pt.life=pt.maxLife}p.noStroke();p.fill(pt.hue,150,255,p.map(pt.life,0,pt.maxLife,0,180));p.circle(pt.x,pt.y,pt.size)}};p.windowResized=function(){let w=document.getElementById('hero-wrap');W=w.offsetWidth;H=600;p.resizeCanvas(W,H);cols=Math.ceil(W/S)+1;rows=Math.ceil(H/S)+1}}, 'hero-wrap');
</script>

    <a href="https://linkedin.com/in/xhuljanocaushllari" style="font-family:monospace;font-size:0.8rem;color:rgba(130,180,240,0.7);text-decoration:none;padding:0.4rem 1rem;border:1px solid rgba(60,70,100,0.3);border-radius:6px;">LinkedIn</a>
    <a href="mailto:xcaushlari@gmail.com" style="font-family:monospace;font-size:0.8rem;color:rgba(130,180,240,0.7);text-decoration:none;padding:0.4rem 1rem;border:1px solid rgba(60,70,100,0.3);border-radius:6px;">Email</a>
  </div>

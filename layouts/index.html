{{- define "main" }}
<style>
#hero-wrap {
  width: 100%;
  height: 600px;
  background: #06060c;
  position: relative;
  overflow: hidden;
  cursor: crosshair;
}
#hero-wrap canvas {
  display: block;
}
#hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  pointer-events: none;
}
#hero-text h1 {
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 2.8rem;
  color: rgba(255,255,255,0.9);
  margin: 0;
  letter-spacing: -1px;
  text-shadow: 0 0 40px rgba(0,180,255,0.3), 0 0 80px rgba(0,180,255,0.1);
}
#hero-text p {
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: rgba(160,170,200,0.6);
  margin-top: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
</style>
<div id="hero-wrap">
  <div id="hero-text">
    <h1>Building with AI Agents</h1>
    <p>Cloud Engineering Student · AI Agents · MCP · Homelab</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<script>
new p5(function(p) {
  let W, H;
  let flowField = [];
  let particles = [];
  let mouseTrail = [];
  let geoShapes = [];
  let time = 0;
  let cols, rows;
  const SCALE = 20;
  const PARTICLE_COUNT = 400;
  const GEO_COUNT = 12;
  
  p.setup = function() {
    let wrap = document.getElementById('hero-wrap');
    W = wrap.offsetWidth;
    H = 600;
    p.createCanvas(W, H).parent('hero-wrap');
    cols = Math.ceil(W / SCALE) + 1;
    rows = Math.ceil(H / SCALE) + 1;
    
    // Build flow field
    for (let y = 0; y < rows; y++) {
      flowField[y] = [];
      for (let x = 0; x < cols; x++) {
        flowField[y][x] = p.createVector(0, 0);
      }
    }
    
    // Create particles
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: p.random(W),
        y: p.random(H),
        vx: 0,
        vy: 0,
        life: p.random(60, 200),
        maxLife: 200,
        hue: p.random(190, 250),
        size: p.random(1, 3)
      });
    }
    
    // Create geometric shapes
    for (let i = 0; i < GEO_COUNT; i++) {
      geoShapes.push({
        x: p.random(W),
        y: p.random(H),
        r: p.random(40, 120),
        sides: p.floor(p.random(3, 8)),
        rotation: p.random(p.TWO_PI),
        rotSpeed: p.random(-0.005, 0.005),
        hue: p.random(190, 260),
        alpha: p.random(2, 8),
        life: p.random(100, 300),
        phase: p.random(p.TWO_PI)
      });
    }
  };

  p.draw = function() {
    p.background(6, 6, 12);
    time += 0.005;
    
    // Update flow field with noise
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        let angle = p.noise(x * 0.08, y * 0.08, time * 0.3) * p.TWO_PI * 2;
        flowField[y][x].x = p.cos(angle);
        flowField[y][x].y = p.sin(angle);
      }
    }
    
    // Draw geometric shapes (background layer)
    for (let g of geoShapes) {
      g.life--;
      if (g.life <= 0) {
        g.x = p.random(W);
        g.y = p.random(H);
        g.life = p.random(100, 300);
        g.alpha = p.random(2, 8);
      }
      g.rotation += g.rotSpeed;
      let pulse = 1 + 0.15 * p.sin(time * 2 + g.phase);
      p.push();
      p.translate(g.x, g.y);
      p.rotate(g.rotation);
      p.noFill();
      p.stroke(g.hue, 120, 200, g.alpha * 0.4);
      p.strokeWeight(0.5);
      p.beginShape();
      for (let i = 0; i < g.sides; i++) {
        let angle = (i / g.sides) * p.TWO_PI - p.HALF_PI;
        let rx = p.cos(angle) * g.r * pulse;
        let ry = p.sin(angle) * g.r * pulse;
        p.vertex(rx, ry);
      }
      p.endShape(p.CLOSE);
      p.pop();
    }
    
    // Draw mouse trail
    if (p.mouseX > 0 && p.mouseX < W && p.mouseY > 0 && p.mouseY < H) {
      mouseTrail.push({ x: p.mouseX, y: p.mouseY, life: 30 });
      if (mouseTrail.length > 20) mouseTrail.shift();
    }
    for (let i = 0; i < mouseTrail.length; i++) {
      let t = mouseTrail[i];
      t.life--;
      if (t.life > 0) {
        let alpha = p.map(t.life, 0, 30, 0, 40);
        p.noStroke();
        p.fill(100, 180, 255, alpha);
        p.circle(t.x, t.y, 3);
      }
    }
    
    // Update and draw particles
    for (let p_ of particles) {
      let col = p.floor(p_.x / SCALE);
      let row = p.floor(p_.y / SCALE);
      col = p.constrain(col, 0, cols - 1);
      row = p.constrain(row, 0, rows - 1);
      
      let force = flowField[row][col];
      p_.vx += force.x * 0.1;
      p_.vy += force.y * 0.1;
      
      // Mouse attraction
      if (p.mouseX > 0 && p.mouseX < W && p.mouseY > 0 && p.mouseY < H) {
        let dx = p.mouseX - p_.x;
        let dy = p.mouseY - p_.y;
        let dist = p.sqrt(dx * dx + dy * dy);
        if (dist < 200) {
          let strength = p.map(dist, 0, 200, 0.3, 0);
          p_.vx += (dx / dist) * strength;
          p_.vy += (dy / dist) * strength;
        }
      }
      
      p_.vx *= 0.95;
      p_.vy *= 0.95;
      p_.x += p_.vx;
      p_.y += p_.vy;
      
      // Wrap around
      if (p_.x < 0) p_.x = W;
      if (p_.x > W) p_.x = 0;
      if (p_.y < 0) p_.y = H;
      if (p_.y > H) p_.y = 0;
      
      p_.life--;
      if (p_.life <= 0) {
        p_.x = p.random(W);
        p_.y = p.random(H);
        p_.life = p_.maxLife;
      }
      
      let alpha = p.map(p_.life, 0, p_.maxLife, 0, 180);
      p.noStroke();
      p.fill(p_.hue, 150, 255, alpha);
      p.circle(p_.x, p_.y, p_.size);
    }
  };

  p.windowResized = function() {
    let wrap = document.getElementById('hero-wrap');
    W = wrap.offsetWidth;
    H = 600;
    p.resizeCanvas(W, H);
    cols = Math.ceil(W / SCALE) + 1;
    rows = Math.ceil(H / SCALE) + 1;
  };
}, 'hero-wrap');
</script>

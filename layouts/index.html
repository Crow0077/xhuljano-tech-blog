{{- define "main" }}
<style>
#hero-wrap{width:100%;height:600px;background:#020208;position:relative;overflow:hidden;cursor:grab}
#hero-wrap:active{cursor:grabbing}
#hero-wrap canvas{display:block;position:absolute;top:0;left:0}
#hero-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;pointer-events:none}
#hero-text h1{font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;font-size:2.8rem;color:rgba(255,255,255,0.9);margin:0;letter-spacing:-1px;text-shadow:0 0 40px rgba(255,180,50,0.2),0 0 80px rgba(255,180,50,0.08)}
#hero-text p{font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;font-size:0.85rem;color:rgba(160,170,200,0.6);margin-top:12px;letter-spacing:3px;text-transform:uppercase}
</style>
<div id="hero-wrap">
  <div id="hero-text"><h1>Building with AI Agents</h1><p>Cloud Engineering Student · AI Agents · MCP · Homelab</p></div>
</div>
<script>
(function(){
const wp=document.getElementById("hero-wrap"),cv=document.createElement("canvas"),x=cv.getContext("2d");
wp.appendChild(cv);const HH=600;
let W,H,dpr,time=0,dt=0,lt=0;
let camDist=12,camLat=.25,camLon=0.5,cd=12,cl=.25,clo=.5;
let mouse={x:0,y:0,down:!1,px:0,py:0},hovered=-1;
let stars=[],st=[];

const planets=[
  {name:"Mercury",c:"#b5b5b5",o:2.5,s:0.25,sp:3.5,r:!1},
  {name:"Venus",c:"#e8cda0",o:3.5,s:0.45,sp:2.5,r:!1},
  {name:"Earth",c:"#5599dd",o:4.8,s:0.48,sp:2.0,r:!1},
  {name:"Mars",c:"#dd6644",o:6.0,s:0.32,sp:1.6,r:!1},
  {name:"Jupiter",c:"#d4a574",o:8.5,s:1.4,sp:0.85,r:!1},
  {name:"Saturn",c:"#e8d5a3",o:10.5,s:1.15,sp:0.62,r:!0},
  {name:"Uranus",c:"#8cd4d4",o:12.5,s:0.72,sp:0.44,r:!1},
  {name:"Neptune",c:"#4466dd",o:14.0,s:0.68,sp:0.35,r:!1},
];
const ps=planets.map(p=>({angle:Math.random()*Math.PI*2,ox:0,oy:0,oz:0}));

function rY(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c]}
function rX(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c]}

function prj(wx,wy,wz){
  const cx=cd*Math.cos(cl)*Math.sin(clo),cy=cd*Math.sin(cl),cz=cd*Math.cos(cl)*Math.cos(clo);
  const fx=-cx,fy=-cy,fz=-cz,fm=Math.sqrt(fx*fx+fy*fy+fz*fz),fwx=fx/fm,fwy=fy/fm,fwz=fz/fm;
  let rx=1*fwz-0*fwy,ry=0*fwx-0*fwz,rz=0*fwy-1*fwx;
  const rmag=Math.sqrt(rx*rx+ry*ry+rz*rz);rx/=rmag;ry/=rmag;rz/=rmag;
  const ux=fwy*rz-fwz*ry,uy=fwz*rx-fwx*rz,uz=fwx*ry-fwy*rx;
  const dx=wx-cx,dy=wy-cy,dz=wz-cz;
  const sx=dx*rx+dy*ry+dz*rz,sy=dx*ux+dy*uy+dz*uz,sz=dx*fwx+dy*fwy+dz*fwz;
  if(sz<0.1)return null;
  const SCALE=Math.min(W,H)*0.65;
  const sc=SCALE/sz;
  return{x:W/2+sx*sc,y:H/2-sy*sc,z:sz,sc:sc};
}

for(let i=0;i<400;i++){const a=Math.random()*Math.PI*2,b=Math.acos(2*Math.random()-1),r=25+Math.random()*55;stars.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,sz:.4+Math.random()*1.8,br:.5+Math.random()*.5});st.push({sp:.5+Math.random()*3,ph:Math.random()*Math.PI*2})}

function lg(c,a){const p=parseInt;return'rgb('+[c.slice(1,3),c.slice(3,5),c.slice(5,7)].map(h=>Math.min(255,Math.round(p(h,16)+255*a))).join()+')'}
function dk(c,a){const p=parseInt;return'rgb('+[c.slice(1,3),c.slice(3,5),c.slice(5,7)].map(h=>Math.max(0,Math.round(p(h,16)*(1-a)))).join()+')'}

function drawSun(){
  const p=prj(0,0,0);if(!p)return;
  const r=Math.max(p.sc*.65,30);
  for(let i=4;i>=0;i--){const gr=Math.round(r+r*.35*i),g=x.createRadialGradient(p.x,p.y,0,p.x,p.y,gr);g.addColorStop(0,`rgba(255,255,200,${.18-i*.03})`);g.addColorStop(.4,`rgba(255,180,50,${.1-i*.015})`);g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,gr,0,Math.PI*2);x.fill()}
  const g2=x.createRadialGradient(p.x-r*.3,p.y-r*.3,r*.04,p.x,p.y,r);g2.addColorStop(0,'#fffde0');g2.addColorStop(.25,'#ffe08a');g2.addColorStop(.6,'#ff9d2e');g2.addColorStop(1,'#cc5500');x.fillStyle=g2;x.beginPath();x.arc(p.x,p.y,r,0,Math.PI*2);x.fill()
}

function dPlanet(px,py,pz,r,col,rings){
  const p=prj(px,py,pz);if(!p)return null;
  const sr=Math.max(p.sc*r,2);
  const g=x.createRadialGradient(p.x-sr*.3,p.y-sr*.3,sr*.04,p.x,p.y,sr);g.addColorStop(0,lg(col,.5));g.addColorStop(.55,col);g.addColorStop(1,dk(col,.55));x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,sr,0,Math.PI*2);x.fill();
  x.fillStyle='rgba(0,0,0,.22)';x.beginPath();x.arc(p.x+sr*.18,p.y,sr*.82,-Math.PI*.45,Math.PI*.45);x.fill();
  if(rings){x.save();x.translate(p.x,p.y);x.scale(1,.26);x.rotate(-.35);x.strokeStyle='rgba(210,190,150,.55)';x.lineWidth=sr*.2;x.beginPath();x.ellipse(0,0,sr*2.4,sr*2.4,0,Math.PI*.65,Math.PI*1.75);x.stroke();x.strokeStyle='rgba(190,170,130,.4)';x.lineWidth=sr*.4;x.beginPath();x.ellipse(0,0,sr*1.85,sr*1.85,0,Math.PI*.55,Math.PI*1.85);x.stroke();x.restore()}
  return{x:p.x,y:p.y,r:sr}
}

function rs(){dpr=Math.min(devicePixelRatio||1,2);W=wp.offsetWidth;H=HH;cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
rs();addEventListener("resize",rs);

function fr(now){
  dt=lt?Math.min((now-lt)/1e3,.1):.016;lt=now;time+=dt;
  camDist+=(cd-camDist)*Math.min(dt*4,1);camLat+=(cl-camLat)*Math.min(dt*6,1);camLon+=(clo-camLon)*Math.min(dt*6,1);
  if(!mouse.down)clo+=0.15*dt;
  x.fillStyle='#020208';x.fillRect(0,0,W,H);
  for(let i=0;i<stars.length;i++){const s=stars[i],p=prj(s.x,s.y,s.z);if(!p)continue;const tw=s.br*(.65+.35*Math.sin(time*st[i].sp+st[i].ph));x.fillStyle=`rgba(200,215,255,${tw*.85})`;x.beginPath();x.arc(p.x,p.y,Math.max(.35,s.sz*.75),0,Math.PI*2);x.fill()}
  for(const p of planets){x.strokeStyle='rgba(255,255,255,.055)';x.lineWidth=.6;x.beginPath();let f=!0;for(let a=0;a<=Math.PI*2;a+=.05){const pt=prj(Math.cos(a)*p.o,0,Math.sin(a)*p.o);if(!pt)continue;if(f){x.moveTo(pt.x,pt.y);f=!1}else x.lineTo(pt.x,pt.y)}x.stroke()}
  for(let i=0;i<planets.length;i++){ps[i].angle+=planets[i].sp*dt;ps[i].ox=Math.cos(ps[i].angle)*planets[i].o;ps[i].oz=Math.sin(ps[i].angle)*planets[i].o}
  drawSun();
  const scr=[],order=[...planets.keys()].sort((a,b)=>{const pa=prj(ps[a].ox,ps[a].oy,ps[a].oz),pb=prj(ps[b].ox,ps[b].oy,ps[b].oz);return(pb?pb.z:0)-(pa?pa.z:0)});
  hovered=-1;let cdMin=40;
  for(const i of order){const r=dPlanet(ps[i].ox,ps[i].oy,ps[i].oz,planets[i].s,planets[i].c,planets[i].r);if(r){scr.push({i,x:r.x,y:r.y,r:r.r});if(i===2){const ma=time*4.5+ps[i].angle*3,dst=.4;dPlanet(ps[i].ox+Math.cos(ma)*dst,ps[i].oy,ps[i].oz+Math.sin(ma)*dst,.09,'#ddd',!1)}}}
  if(mouse.x>0&&mouse.y>0)for(const s of scr){const dx=mouse.x-s.x,dy=mouse.y-s.y,d=Math.sqrt(dx*dx+dy*dy);if(d<Math.max(s.r+8,22)&&d<cdMin){hovered=s.i;cdMin=d}}
  if(hovered>=0)cv.style.cursor='pointer';else cv.style.cursor=mouse.down?'grabbing':'grab';
  requestAnimationFrame(fr);
}

wp.addEventListener("mousedown",e=>{mouse.down=!0;mouse.px=e.clientX;mouse.py=e.clientY;e.preventDefault()});
wp.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY;if(mouse.down){clo+=(e.clientX-mouse.px)*.004;cl-=(e.clientY-mouse.py)*.004;cl=Math.max(-1.2,Math.min(1.2,cl));mouse.px=e.clientX;mouse.py=e.clientY}});
wp.addEventListener("mouseup",()=>{mouse.down=!1});
wp.addEventListener("mouseleave",()=>{mouse.down=!1;mouse.x=-1;mouse.y=-1});
wp.addEventListener("click",e=>{if(hovered>=0){cd=planets[hovered].o*1.4;cl=.12}});
wp.addEventListener("dblclick",e=>{cd=12;cl=.25;clo+=.5;e.preventDefault()});
wp.addEventListener("wheel",e=>{e.preventDefault();cd=Math.max(4,Math.min(30,cd-e.deltaY*.015))},{passive:!1});
wp.addEventListener("touchstart",e=>{if(e.touches.length===1){mouse.down=!0;mouse.px=e.touches[0].clientX;mouse.py=e.touches[0].clientY;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}e.preventDefault()});
wp.addEventListener("touchmove",e=>{if(mouse.down&&e.touches.length===1){clo+=(e.touches[0].clientX-mouse.px)*.004;cl-=(e.touches[0].clientY-mouse.py)*.004;cl=Math.max(-1.2,Math.min(1.2,cl));mouse.px=e.touches[0].clientX;mouse.py=e.touches[0].clientY;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cd=Math.max(4,Math.min(30,12-(d-150)*.025))}e.preventDefault()},{passive:!1});
wp.addEventListener("touchend",()=>{mouse.down=!1});
requestAnimationFrame(fr);
})();
</script>

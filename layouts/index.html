{{- define "main" }}
<style>
#hero-wrap {
  width: 100%;
  height: 500px;
  background: #080810;
  position: relative;
  overflow: hidden;
}
#hero-wrap canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}
</style>
<div id="hero-wrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<script>
new p5(function(p) {
  let nodes = [];
  let particles = [];
  let W, H;
  
  const COLORS = [
    [0, 200, 255],   // hermes - cyan
    [255, 120, 60],  // firecrawl - orange
    [0, 255, 150],   // uptime - green
    [160, 110, 255], // github - purple
    [255, 210, 50],  // n8n - yellow
    [255, 70, 110],  // adguard - red
    [110, 255, 210], // tailscale - teal
  ];
  const LABELS = ['HERMES', 'FIRECRAWL', 'UPTIME KUMA', 'GITHUB', 'N8N', 'ADGUARD', 'TAILSCALE'];
  
  p.setup = function() {
    let wrap = document.getElementById('hero-wrap');
    W = wrap.offsetWidth;
    H = 500;
    let c = p.createCanvas(W, H);
    c.parent('hero-wrap');
    p.colorMode(p.RGB, 255);
    
    // Create nodes in a circle
    let cx = W / 2, cy = H / 2, r = Math.min(W, H) * 0.3;
    for (let i = 0; i < 7; i++) {
      let a = (p.TWO_PI / 7) * i - p.HALF_PI;
      nodes.push({
        x: cx + Math.cos(a) * r,
        y: cy + Math.sin(a) * r,
        vx: 0, vy: 0,
        col: COLORS[i],
        label: LABELS[i],
        size: 28 + (i === 0 ? 6 : 0),
        phase: p.random(p.TWO_PI)
      });
    }
    
    // Create particles
    for (let i = 0; i < 60; i++) {
      particles.push(newParticle());
    }
  };
  
  function newParticle() {
    let src = Math.floor(Math.random() * 7);
    let tgt;
    do { tgt = Math.floor(Math.random() * 7); } while (tgt === src);
    return {
      src: src, tgt: tgt,
      t: Math.random(),
      speed: 0.003 + Math.random() * 0.008,
      size: 2 + Math.random() * 2,
      trail: []
    };
  }
  
  p.draw = function() {
    // Dark background
    p.background(8, 8, 16);
    
    // Grid lines
    p.stroke(20, 20, 35);
    p.strokeWeight(0.5);
    for (let x = 0; x < W; x += 50) p.line(x, 0, x, H);
    for (let y = 0; y < H; y += 50) p.line(0, y, W, y);
    
    // Update node positions (gentle drift)
    for (let n of nodes) {
      // Drift toward center if too far
      let dx = W/2 - n.x, dy = H/2 - n.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      let maxR = Math.min(W, H) * 0.4;
      if (dist > maxR) {
        n.vx += dx * 0.0003;
        n.vy += dy * 0.0003;
      }
      
      // Mouse repulsion
      let mdx = p.mouseX - n.x, mdy = p.mouseY - n.y;
      let md = Math.sqrt(mdx*mdx + mdy*mdy);
      if (md < 150 && md > 0 && p.mouseX > 0 && p.mouseY > 0) {
        n.vx += (mdx / md) * 0.08;
        n.vy += (mdy / md) * 0.08;
      }
      
      // Repulsion from other nodes
      for (let o of nodes) {
        if (o === n) continue;
        let odx = n.x - o.x, ody = n.y - o.y;
        let od = Math.sqrt(odx*odx + ody*ody);
        if (od < 100 && od > 0) {
          n.vx += (odx / od) * 0.2;
          n.vy += (ody / od) * 0.2;
        }
      }
      
      n.vx *= 0.95; // friction
      n.vy *= 0.95;
      n.x += n.vx;
      n.y += n.vy;
      n.phase += 0.02;
    }
    
    // Draw connection lines
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let d = Math.sqrt(dx*dx + dy*dy);
        if (d < 250) {
          let a = p.map(d, 0, 250, 40, 5);
          p.stroke(40, 40, 60, a);
          p.strokeWeight(0.8);
          p.line(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
        }
      }
    }
    
    // Update and draw particles
    for (let pt of particles) {
      pt.t += pt.speed;
      if (pt.t >= 1) {
        Object.assign(pt, newParticle());
        pt.t = 0;
        pt.trail = [];
      }
      
      let s = nodes[pt.src], tgt = nodes[pt.tgt];
      // Bezier path
      let mx = (s.x + tgt.x) / 2, my = (s.y + tgt.y) / 2;
      let perpX = -(tgt.y - s.y) * 0.15, perpY = (tgt.x - s.x) * 0.15;
      if (pt.src % 2 === 0) { perpX *= -1; perpY *= -1; }
      let cx = mx + perpX, cy = my + perpY;
      
      let t = pt.t;
      let px = (1-t)*(1-t)*s.x + 2*(1-t)*t*cx + t*t*tgt.x;
      let py = (1-t)*(1-t)*s.y + 2*(1-t)*t*cy + t*t*tgt.y;
      
      pt.trail.push({x: px, y: py});
      if (pt.trail.length > 6) pt.trail.shift();
      
      // Draw trail
      let col = COLORS[pt.src];
      for (let i = 0; i < pt.trail.length; i++) {
        let al = p.map(i, 0, pt.trail.length, 10, 100);
        let sz = p.map(i, 0, pt.trail.length, 0.5, pt.size * 0.7);
        p.noStroke();
        p.fill(col[0], col[1], col[2], al);
        p.ellipse(pt.trail[i].x, pt.trail[i].y, sz, sz);
      }
      
      // Draw particle
      p.fill(col[0], col[1], col[2], 200);
      p.noStroke();
      p.ellipse(px, py, pt.size, pt.size);
      p.fill(255, 255, 255, 150);
      p.ellipse(px, py, pt.size * 0.3, pt.size * 0.3);
    }
    
    // Draw nodes (on top)
    for (let n of nodes) {
      let pulse = Math.sin(n.phase) * 0.2 + 0.8;
      
      // Glow
      p.noStroke();
      for (let i = 3; i > 0; i--) {
        p.fill(n.col[0], n.col[1], n.col[2], 12 * i);
        p.ellipse(n.x, n.y, n.size * 2 * i * pulse * 0.5, n.size * 2 * i * pulse * 0.5);
      }
      
      // Core
      p.fill(n.col[0], n.col[1], n.col[2], 180);
      p.stroke(n.col[0], n.col[1], n.col[2], 60);
      p.strokeWeight(1);
      p.ellipse(n.x, n.y, n.size * pulse, n.size * pulse);
      
      // Center dot
      p.noStroke();
      p.fill(255, 255, 255, 120);
      p.ellipse(n.x, n.y, n.size * 0.2, n.size * 0.2);
      
      // Label
      p.fill(n.col[0], n.col[1], n.col[2], 140);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(9);
      p.textFont('monospace');
      p.text(n.label, n.x, n.y + n.size * 0.7);
    }
  };
  
  p.windowResized = function() {
    let wrap = document.getElementById('hero-wrap');
    W = wrap.offsetWidth;
    H = 500;
    p.resizeCanvas(W, H);
  };
}, 'hero-wrap');
</script>

<section class="post-content">
  {{ .Content }}
</section>
{{- end }}

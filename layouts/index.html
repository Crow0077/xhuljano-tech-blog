{{- define "main" }}
<div id="hero-canvas" style="width: 100%; height: 500px; position: relative; overflow: hidden; background: #0a0a0f;"></div>

<script>p5.disableFriendlyErrors = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<script>
// === Generative Network Visualization ===
// Represents Xhuljano's homelab infrastructure as a living network

const CONFIG = {
  nodeCount: 7,
  particleCount: 80,
  connectionDistance: 250,
  nodePulseSpeed: 0.02,
  particleSpeed: 1.0,
  mouseInfluence: 120,
  trailLength: 6,
};

const PALETTE = {
  bg: [10, 10, 15],
  hermes: [0, 200, 255],
  firecrawl: [255, 100, 50],
  uptime: [0, 255, 150],
  github: [150, 100, 255],
  n8n: [255, 200, 0],
  adguard: [255, 50, 100],
  tailscale: [100, 255, 200],
  connection: [40, 40, 60],
  particle: [200, 200, 220],
};

let nodes = [];
let particles = [];
let canvasReady = false;

class InfrastructureNode {
  constructor(x, y, label, col, sz) {
    this.pos = createVector(x, y);
    this.vel = p5.Vector.random2D().mult(0.3);
    this.label = label;
    this.col = col;
    this.sz = sz;
    this.phase = random(TWO_PI);
    this.glow = 0;
  }

  update() {
    this.pos.add(this.vel);
    const m = 60;
    if (this.pos.x < m || this.pos.x > width - m) this.vel.x *= -1;
    if (this.pos.y < m || this.pos.y > height - m) this.vel.y *= -1;
    
    for (let other of nodes) {
      if (other === this) continue;
      let d = p5.Vector.dist(this.pos, other.pos);
      if (d < 100) {
        let f = p5.Vector.sub(this.pos, other).normalize().mult(0.3);
        this.vel.add(f);
      }
    }
    
    let md = dist(mouseX, mouseY, this.pos.x, this.pos.y);
    if (md < CONFIG.mouseInfluence && mouseX > 0 && mouseY > 0) {
      let a = p5.Vector.sub(createVector(mouseX, mouseY), this.pos);
      a.normalize().mult(0.1);
      this.vel.add(a);
      this.glow = min(this.glow + 0.08, 1);
    } else {
      this.glow = max(this.glow - 0.015, 0);
    }
    
    this.vel.limit(0.6);
    this.phase += CONFIG.nodePulseSpeed;
  }

  draw() {
    push();
    translate(this.pos.x, this.pos.y);
    let p = sin(this.phase) * 0.3 + 0.7;
    let gs = this.sz * (1.8 + p + this.glow);
    
    // Glow
    noStroke();
    for (let i = 3; i > 0; i--) {
      fill(this.col[0], this.col[1], this.col[2], 15 * i);
      ellipse(0, 0, gs * i * 0.4, gs * i * 0.4);
    }
    
    // Core
    fill(this.col[0], this.col[1], this.col[2], 180 + this.glow * 75);
    stroke(this.col[0], this.col[1], this.col[2], 80);
    strokeWeight(1.2);
    ellipse(0, 0, this.sz * p, this.sz * p);
    
    // Bright center
    noStroke();
    fill(255, 255, 255, 120 + this.glow * 135);
    ellipse(0, 0, this.sz * 0.25, this.sz * 0.25);
    
    // Label
    fill(this.col[0], this.col[1], this.col[2], 160);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(9);
    textFont('monospace');
    text(this.label, 0, this.sz * 0.75);
    pop();
  }
}

class DataParticle {
  constructor() {
    this.trail = [];
    this.reset();
  }

  reset() {
    this.src = floor(random(CONFIG.nodeCount));
    do { this.tgt = floor(random(CONFIG.nodeCount)); } while (this.tgt === this.src);
    this.t = 0;
    this.spd = random(0.006, 0.014) * CONFIG.particleSpeed;
    this.sz = random(2, 4);
    this.trail = [];
  }

  update() {
    this.t += this.spd;
    if (this.t >= 1) { this.reset(); return; }
    
    let s = nodes[this.src].pos;
    let e = nodes[this.tgt].pos;
    let mid = p5.Vector.add(s, e).mult(0.5);
    let perp = p5.Vector.sub(e, s).rotate(HALF_PI).mult(0.15 * (this.src % 3 === 0 ? 1 : -1));
    let c = p5.Vector.add(mid, perp);
    
    let x = (1-this.t)*(1-this.t)*s.x + 2*(1-this.t)*this.t*c.x + this.t*this.t*e.x;
    let y = (1-this.t)*(1-this.t)*s.y + 2*(1-this.t)*this.t*c.y + this.t*this.t*e.y;
    
    this.pos = createVector(x, y);
    this.trail.push({x, y});
    if (this.trail.length > CONFIG.trailLength) this.trail.shift();
  }

  draw() {
    if (!this.pos) return;
    let col = nodes[this.src].col;
    
    // Trail
    noStroke();
    for (let i = 0; i < this.trail.length; i++) {
      let a = map(i, 0, this.trail.length, 10, 120);
      let s = map(i, 0, this.trail.length, 0.5, this.sz * 0.8);
      fill(col[0], col[1], col[2], a);
      ellipse(this.trail[i].x, this.trail[i].y, s, s);
    }
    
    // Particle
    fill(col[0], col[1], col[2], 200);
    ellipse(this.pos.x, this.pos.y, this.sz, this.sz);
    fill(255, 255, 255, 160);
    ellipse(this.pos.x, this.pos.y, this.sz * 0.3, this.sz * 0.3);
  }
}

function setup() {
  let container = document.getElementById('hero-canvas');
  let c = createCanvas(container.offsetWidth, 500);
  c.parent('hero-canvas');
  colorMode(RGB, 255);
  background(PALETTE.bg[0], PALETTE.bg[1], PALETTE.bg[2]);
  
  // Create nodes in a ring
  let cx = width / 2;
  let cy = height / 2;
  let r = min(width, height) * 0.28;
  
  let nodeInfo = [
    {l:'HERMES', c:PALETTE.hermes, s:30},
    {l:'FIRECRAWL', c:PALETTE.firecrawl, s:24},
    {l:'UPTIME KUMA', c:PALETTE.uptime, s:24},
    {l:'GITHUB', c:PALETTE.github, s:26},
    {l:'N8N', c:PALETTE.n8n, s:22},
    {l:'ADGUARD', c:PALETTE.adguard, s:20},
    {l:'TAILSCALE', c:PALETTE.tailscale, s:22}
  ];
  
  for (let i = 0; i < CONFIG.nodeCount; i++) {
    let a = (TWO_PI / CONFIG.nodeCount) * i - HALF_PI;
    let rr = r * (0.8 + 0.2 * sin(i * 2.1));
    nodes.push(new InfrastructureNode(
      cx + cos(a) * rr,
      cy + sin(a) * rr,
      nodeInfo[i].l, nodeInfo[i].c, nodeInfo[i].s
    ));
  }
  
  for (let i = 0; i < CONFIG.particleCount; i++) {
    let p = new DataParticle();
    p.t = random(1);
    particles.push(p);
  }
  
  canvasReady = true;
}

function draw() {
  if (!canvasReady) return;
  
  // Dark background with slight fade for trails
  background(PALETTE.bg[0], PALETTE.bg[1], PALETTE.bg[2]);
  
  // Grid
  stroke(25, 25, 40, 25);
  strokeWeight(0.5);
  for (let x = 0; x < width; x += 50) line(x, 0, x, height);
  for (let y = 0; y < height; y += 50) line(0, y, width, y);
  
  // Connections
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      let d = p5.Vector.dist(nodes[i].pos, nodes[j].pos);
      if (d < CONFIG.connectionDistance) {
        let a = map(d, 0, CONFIG.connectionDistance, 50, 8);
        stroke(50, 50, 70, a);
        strokeWeight(0.8);
        line(nodes[i].pos.x, nodes[i].pos.y, nodes[j].pos.x, nodes[j].pos.y);
      }
    }
  }
  
  // Particles
  for (let p of particles) { p.update(); p.draw(); }
  
  // Nodes (drawn last so they're on top)
  for (let n of nodes) { n.update(); n.draw(); }
}

function windowResized() {
  let container = document.getElementById('hero-canvas');
  resizeCanvas(container.offsetWidth, 500);
  background(PALETTE.bg[0], PALETTE.bg[1], PALETTE.bg[2]);
}
</script>

<section class="post-content">
  {{ .Content }}
</section>
{{- end }}

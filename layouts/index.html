{{- define "main" }}
<style>
#hero-wrap {
  width: 100%;
  height: 600px;
  background: #06060c;
  position: relative;
  overflow: hidden;
  cursor: crosshair;
}
#hero-wrap canvas {
  display: block;
}
#hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  pointer-events: none;
}
#hero-text h1 {
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 2.8rem;
  color: rgba(255,255,255,0.9);
  margin: 0;
  letter-spacing: -1px;
  text-shadow: 0 0 40px rgba(0,180,255,0.3), 0 0 80px rgba(0,180,255,0.1);
}
#hero-text p {
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: rgba(160,170,200,0.6);
  margin-top: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
</style>
<div id="hero-wrap">
  <div id="hero-text">
    <h1>Building in Public</h1>
    <p>Homelab · AI Agents · MCP · Cloud</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<script>
new p5(function(p) {
  let W, H;
  let flowField = [];
  let particles = [];
  let mouseTrail = [];
  let geoShapes = [];
  let time = 0;
  let cols, rows;
  const SCALE = 20;
  const PARTICLE_COUNT = 400;
  const GEO_COUNT = 12;
  
  p.setup = function() {
    let wrap = document.getElementById('hero-wrap');
    W = wrap.offsetWidth;
    H = 600;
    let c = p.createCanvas(W, H);
    c.parent('hero-wrap');
    p.colorMode(p.HSB, 360, 100, 100, 100);
    
    cols = Math.ceil(W / SCALE) + 1;
    rows = Math.ceil(H / SCALE) + 1;
    
    // Flow particles
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: p.random(W), y: p.random(H),
        vx: 0, vy: 0,
        life: p.random(100, 300),
        maxLife: 300,
        hue: p.random(180, 240),
        size: p.random(1, 3)
      });
    }
    
    // Geometric shapes
    for (let i = 0; i < GEO_COUNT; i++) {
      geoShapes.push({
        x: p.random(W), y: p.random(H),
        size: p.random(30, 80),
        rotation: p.random(p.TWO_PI),
        rotSpeed: p.random(-0.005, 0.005),
        sides: Math.floor(p.random(3, 8)),
        hue: p.random(180, 260),
        alpha: p.random(3, 10),
        driftX: p.random(-0.2, 0.2),
        driftY: p.random(-0.2, 0.2)
      });
    }
  };
  
  p.draw = function() {
    time += 0.005;
    
    // Semi-transparent background for trails
    p.noStroke();
    p.fill(230, 80, 3, 100);
    p.rect(0, 0, W, H);
    
    // Update flow field
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        let angle = p.noise(x * 0.08, y * 0.08, time) * p.TWO_PI * 2;
        
        // Mouse influence
        let mx = x * SCALE, my = y * SCALE;
        let dx = p.mouseX - mx, dy = p.mouseY - my;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200 && dist > 0) {
          let influence = p.map(dist, 0, 200, 1, 0);
          let mouseAngle = Math.atan2(dy, dx);
          angle = p.lerp(angle, mouseAngle, influence * 0.6);
        }
        
        flowField[y * cols + x] = angle;
      }
    }
    
    // Draw geometric shapes (background layer)
    for (let g of geoShapes) {
      g.rotation += g.rotSpeed;
      g.x += g.driftX;
      g.y += g.driftY;
      
      // Wrap around
      if (g.x < -g.size) g.x = W + g.size;
      if (g.x > W + g.size) g.x = -g.size;
      if (g.y < -g.size) g.y = H + g.size;
      if (g.y > H + g.size) g.y = -g.size;
      
      // Mouse repulsion
      let dx = p.mouseX - g.x, dy = p.mouseY - g.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150 && dist > 0) {
        g.x -= (dx / dist) * 1.5;
        g.y -= (dy / dist) * 1.5;
      }
      
      // Draw polygon
      p.push();
      p.translate(g.x, g.y);
      p.rotate(g.rotation);
      p.noFill();
      p.stroke(g.hue, 60, 40, g.alpha);
      p.strokeWeight(0.5);
      p.beginShape();
      for (let i = 0; i < g.sides; i++) {
        let a = (p.TWO_PI / g.sides) * i;
        p.vertex(Math.cos(a) * g.size, Math.sin(a) * g.size);
      }
      p.endShape(p.CLOSE);
      p.pop();
    }
    
    // Update and draw particles
    for (let pt of particles) {
      let col = Math.floor(pt.x / SCALE);
      let row = Math.floor(pt.y / SCALE);
      
      if (col >= 0 && col < cols && row >= 0 && row < rows) {
        let angle = flowField[row * cols + col];
        let force = 0.3;
        pt.vx += Math.cos(angle) * force;
        pt.vy += Math.sin(angle) * force;
      }
      
      // Mouse attraction
      let dx = p.mouseX - pt.x, dy = p.mouseY - pt.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 180 && dist > 0) {
        let pull = p.map(dist, 0, 180, 0.15, 0);
        pt.vx += (dx / dist) * pull;
        pt.vy += (dy / dist) * pull;
        pt.hue = p.lerp(pt.hue, p.mouseX > W/2 ? 200 : 260, 0.02);
      }
      
      pt.vx *= 0.92;
      pt.vy *= 0.92;
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.life--;
      
      // Reset if dead or off screen
      if (pt.life <= 0 || pt.x < -10 || pt.x > W+10 || pt.y < -10 || pt.y > H+10) {
        pt.x = p.random(W);
        pt.y = p.random(H);
        pt.vx = 0;
        pt.vy = 0;
        pt.life = p.random(100, 300);
        pt.hue = p.random(180, 240);
      }
      
      // Draw
      let alpha = p.map(pt.life, 0, 50, 0, 50);
      if (pt.life > 50) alpha = 50;
      
      p.noStroke();
      p.fill(pt.hue, 70, 80, alpha);
      p.ellipse(pt.x, pt.y, pt.size, pt.size);
      
      // Bright core for some particles
      if (pt.size > 2) {
        p.fill(pt.hue, 40, 100, alpha * 0.5);
        p.ellipse(pt.x, pt.y, pt.size * 0.4, pt.size * 0.4);
      }
    }
    
    // Mouse trail effect
    if (p.mouseX > 0 && p.mouseY > 0) {
      mouseTrail.push({x: p.mouseX, y: p.mouseY, age: 0});
      if (mouseTrail.length > 30) mouseTrail.shift();
    }
    
    for (let i = 0; i < mouseTrail.length; i++) {
      let mt = mouseTrail[i];
      mt.age++;
      let alpha = p.map(mt.age, 0, 30, 15, 0);
      let size = p.map(mt.age, 0, 30, 8, 2);
      p.noStroke();
      p.fill(200, 50, 80, alpha);
      p.ellipse(mt.x, mt.y, size, size);
    }
    
    // Draw connections between nearby particles (sparse)
    p.strokeWeight(0.3);
    for (let i = 0; i < particles.length; i += 3) {
      for (let j = i + 3; j < particles.length; j += 5) {
        let dx = particles[j].x - particles[i].x;
        let dy = particles[j].y - particles[i].y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 60) {
          let alpha = p.map(dist, 0, 60, 8, 0);
          p.stroke(210, 50, 50, alpha);
          p.line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
        }
      }
    }
    
    // Subtle scanlines
    for (let y = 0; y < H; y += 4) {
      p.stroke(0, 0, 0, 3);
      p.strokeWeight(1);
      p.line(0, y, W, y);
    }
  };
  
  p.windowResized = function() {
    let wrap = document.getElementById('hero-wrap');
    W = wrap.offsetWidth;
    H = 600;
    p.resizeCanvas(W, H);
    cols = Math.ceil(W / SCALE) + 1;
    rows = Math.ceil(H / SCALE) + 1;
  };
}, 'hero-wrap');
</script>

<section class="post-content">
  {{ .Content }}
</section>
{{- end }}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Solar System</title>
<style>
:root{--bg:#020208}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Fira Code',monospace;cursor:grab}
body:active{cursor:grabbing}
canvas{position:fixed;inset:0}
.hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:2;color:rgba(255,255,255,0.18);font-size:10px;pointer-events:none;letter-spacing:2px}
.label{position:fixed;z-index:3;color:#fff;font-size:11px;pointer-events:none;text-shadow:0 0 8px rgba(0,0,0,.8);white-space:nowrap;opacity:0;transition:opacity .2s}
.label.visible{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">drag to orbit · scroll to zoom · click planet to focus · double-click to reset</div>
<div class="label" id="lbl"></div>
<script>
const C=document.getElementById("c"),X=C.getContext("2d"),lbl=document.getElementById("lbl");
let W,H,DPR,time=0,dt=0.016,lt=0;
let camDist=22,camLat=0.35,camLon=0,cd=22,cl=0.35,clo=0;
let mouse={x:0,y:0,down:!1,px:0,py:0},hovered=-1;
let stars=[],st=[];

const planets=[
  {name:"Mercury",c:"#b5b5b5",o:3,s:0.08,sp:4.15,r:!1},
  {name:"Venus",c:"#e8cda0",o:4,s:0.18,sp:3,r:!1},
  {name:"Earth",c:"#5599dd",o:5.2,s:0.19,sp:2.4,r:!1},
  {name:"Mars",c:"#dd6644",o:6.5,s:0.13,sp:1.9,r:!1},
  {name:"Jupiter",c:"#d4a574",o:9,s:0.7,sp:1.05,r:!1},
  {name:"Saturn",c:"#e8d5a3",o:11.5,s:0.58,sp:0.78,r:!0},
  {name:"Uranus",c:"#8cd4d4",o:14,s:0.38,sp:0.55,r:!1},
  {name:"Neptune",c:"#4466dd",o:16,s:0.36,sp:0.44,r:!1}
];
const ps=planets.map(p=>({angle:Math.random()*Math.PI*2,ox:0,oy:0,oz:0}));

function rY(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c]}
function rX(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c]}
function prj(wx,wy,wz){
  const cx=cd*Math.cos(cl)*Math.sin(clo),cy=cd*Math.sin(cl),cz=cd*Math.cos(cl)*Math.cos(clo);
  const fx=-cx,fy=-cy,fz=-cz,fm=Math.sqrt(fx*fx+fy*fy+fz*fz),fwx=fx/fm,fwy=fy/fm,fwz=fz/fm;
  let rx=1*fwz-0*fwy,ry=0*fwx-0*fwz,rz=0*fwy-1*fwx;
  const rmag=Math.sqrt(rx*rx+ry*ry+rz*rz);rx/=rmag;ry/=rmag;rz/=rmag;
  const ux=fwy*rz-fwz*ry,uy=fwz*rx-fwx*rz,uz=fwx*ry-fwy*rx;
  const dx=wx-cx,dy=wy-cy,dz=wz-cz;
  const sx=dx*rx+dy*ry+dz*rz,sy=dx*ux+dy*uy+dz*uz,sz=dx*fwx+dy*fwy+dz*fwz;
  if(sz<0.1)return null;const sc=150/sz;
  return{x:W/2+sx*sc,y:H/2-sy*sc,z:sz,sc:sc};
}

for(let i=0;i<500;i++){const a=Math.random()*Math.PI*2,b=Math.acos(2*Math.random()-1),r=35+Math.random()*70;stars.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,sz:0.3+Math.random()*1.8,br:0.4+Math.random()*0.6});st.push({sp:0.5+Math.random()*3,ph:Math.random()*Math.PI*2})}

function lg(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,Math.round(r+255*amt))},${Math.min(255,Math.round(g+255*amt))},${Math.min(255,Math.round(b+255*amt))})`}
function dk(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.max(0,Math.round(r*(1-amt)))},${Math.max(0,Math.round(g*(1-amt)))},${Math.max(0,Math.round(b*(1-amt)))})`}

function drawSun(){
  const p=prj(0,0,0);if(!p)return;
  const r=Math.max(p.sc*0.75,18);
  for(let i=4;i>=0;i--){const gr=Math.round(r+r*0.3*i),g=X.createRadialGradient(p.x,p.y,0,p.x,p.y,gr);g.addColorStop(0,`rgba(255,255,200,${0.15-i*0.025})`);g.addColorStop(0.4,`rgba(255,180,50,${0.08-i*0.012})`);g.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=g;X.beginPath();X.arc(p.x,p.y,gr,0,Math.PI*2);X.fill()}
  const g2=X.createRadialGradient(p.x-r*0.3,p.y-r*0.3,r*0.05,p.x,p.y,r);g2.addColorStop(0,'#fffde0');g2.addColorStop(0.25,'#ffe08a');g2.addColorStop(0.6,'#ff9d2e');g2.addColorStop(1,'#cc5500');X.fillStyle=g2;X.beginPath();X.arc(p.x,p.y,r,0,Math.PI*2);X.fill()
}

function dPlanet(px,py,pz,r,hx,rings){
  const p=prj(px,py,pz);if(!p)return null;
  const sr=Math.max(p.sc*r,1.5);
  const g=X.createRadialGradient(p.x-sr*0.3,p.y-sr*0.3,sr*0.05,p.x,p.y,sr);g.addColorStop(0,lg(hx,0.4));g.addColorStop(0.6,hx);g.addColorStop(1,dk(hx,0.5));X.fillStyle=g;X.beginPath();X.arc(p.x,p.y,sr,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(0,0,0,0.25)';X.beginPath();X.arc(p.x+sr*0.15,p.y,sr*0.85,-Math.PI*0.5,Math.PI*0.5);X.fill();
  if(rings){X.save();X.translate(p.x,p.y);X.scale(1,0.28);X.rotate(-0.4);X.strokeStyle='rgba(210,190,150,0.5)';X.lineWidth=sr*0.18;X.beginPath();X.ellipse(0,0,sr*2.3,sr*2.3,0,Math.PI*0.7,Math.PI*1.7);X.stroke();X.strokeStyle='rgba(190,170,130,0.35)';X.lineWidth=sr*0.35;X.beginPath();X.ellipse(0,0,sr*1.8,sr*1.8,0,Math.PI*0.6,Math.PI*1.8);X.stroke();X.restore()}
  return{x:p.x,y:p.y,r:sr}
}

function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;C.width=W*DPR;C.height=H*DPR;X.setTransform(DPR,0,0,DPR,0,0)}
resize();addEventListener("resize",resize);

function frame(now){
  dt=lt?Math.min((now-lt)/1000,0.1):0.016;lt=now;time+=dt;
  camDist+=(cd-camDist)*Math.min(dt*5,1);camLat+=(cl-camLat)*Math.min(dt*8,1);camLon+=(clo-camLon)*Math.min(dt*8,1);
  X.fillStyle='#020208';X.fillRect(0,0,W,H);
  for(let i=0;i<stars.length;i++){const s=stars[i],p=prj(s.x,s.y,s.z);if(!p)continue;const tw=s.br*(0.7+0.3*Math.sin(time*st[i].sp+st[i].ph)),a=tw*0.8;X.fillStyle=`rgba(200,210,255,${a})`;X.beginPath();X.arc(p.x,p.y,Math.max(0.3,s.sz*0.8),0,Math.PI*2);X.fill()}
  for(const p of planets){X.strokeStyle='rgba(255,255,255,0.04)';X.lineWidth=0.5;X.beginPath();let f=!0;for(let a=0;a<=Math.PI*2;a+=0.06){const pt=prj(Math.cos(a)*p.o,0,Math.sin(a)*p.o);if(!pt)continue;if(f){X.moveTo(pt.x,pt.y);f=!1}else X.lineTo(pt.x,pt.y)}X.stroke()}
  for(let i=0;i<planets.length;i++){ps[i].angle+=planets[i].sp*dt;ps[i].ox=Math.cos(ps[i].angle)*planets[i].o;ps[i].oz=Math.sin(ps[i].angle)*planets[i].o}
  drawSun();
  const scr=[];hovered=-1;let cdMin=50;
  for(let i=0;i<planets.length;i++){const r=dPlanet(ps[i].ox,ps[i].oy,ps[i].oz,planets[i].s,planets[i].c,planets[i].r);if(r){scr.push({i,x:r.x,y:r.y,r:r.r,n:planets[i].name});if(i===2){const ma=time*5+ps[i].angle*3,dst=0.35;dPlanet(ps[i].ox+Math.cos(ma)*dst,ps[i].oy,ps[i].oz+Math.sin(ma)*dst,0.04,'#ddd',!1)}}}
  if(mouse.x>0&&mouse.y>0)for(const s of scr){const dx=mouse.x-s.x,dy=mouse.y-s.y,d=Math.sqrt(dx*dx+dy*dy);if(d<Math.max(s.r+10,24)&&d<cdMin){hovered=s.i;cdMin=d}}
  if(hovered>=0){const s=scr.find(p=>p.i===hovered);if(s){lbl.textContent=s.n;lbl.style.left=(s.x+s.r+10)+'px';lbl.style.top=(s.y-8)+'px';lbl.classList.add('visible');C.style.cursor='pointer'}else{lbl.classList.remove('visible');C.style.cursor=mouse.down?'grabbing':'grab'}}
  else{lbl.classList.remove('visible');C.style.cursor=mouse.down?'grabbing':'grab'}
  requestAnimationFrame(frame)
}

C.addEventListener("mousedown",e=>{mouse.down=!0;mouse.px=e.clientX;mouse.py=e.clientY;e.preventDefault()});
C.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY;if(mouse.down){clo+=(e.clientX-mouse.px)*0.003;cl-=(e.clientY-mouse.py)*0.003;cl=Math.max(-1.2,Math.min(1.2,cl));mouse.px=e.clientX;mouse.py=e.clientY}});
C.addEventListener("mouseup",()=>{mouse.down=!1});
C.addEventListener("mouseleave",()=>{mouse.down=!1;mouse.x=-1;mouse.y=-1});
C.addEventListener("click",e=>{if(hovered>=0){const p=planets[hovered];cd=p.o*1.5;cl=0.15}});
C.addEventListener("dblclick",e=>{cd=22;cl=0.35;clo=0;e.preventDefault()});
C.addEventListener("wheel",e=>{e.preventDefault();cd=Math.max(5,Math.min(50,cd-e.deltaY*0.02))},{passive:!1});
C.addEventListener("touchstart",e=>{if(e.touches.length===1){mouse.down=!0;mouse.px=e.touches[0].clientX;mouse.py=e.touches[0].clientY;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}e.preventDefault()});
C.addEventListener("touchmove",e=>{if(mouse.down&&e.touches.length===1){clo+=(e.touches[0].clientX-mouse.px)*0.003;cl-=(e.touches[0].clientY-mouse.py)*0.003;cl=Math.max(-1.2,Math.min(1.2,cl));mouse.px=e.touches[0].clientX;mouse.py=e.touches[0].clientY;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);cd=Math.max(5,Math.min(50,22-(d-150)*0.03))}e.preventDefault()},{passive:!1});
C.addEventListener("touchend",()=>{mouse.down=!1});
requestAnimationFrame(frame);
</script>
</body>
</html>

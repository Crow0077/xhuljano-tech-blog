baseURL = "https://crow0077.github.io/xhuljano-tech-blog/"
languageCode = "en-us"
title = "Xhuljano Caushllari — AI Platform Engineer"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false

[params]
  env = "production"
  description = "AI Platform Engineer building homelab infrastructure, AI agents, and MCP servers. WGU Cloud and Network Engineering student."
  author = "Xhuljano Caushllari"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  
  [params.homeInfoParams]
    Title = "Xhuljano Caushllari"
    Content = "AI Platform Engineer building production infrastructure with AI agents, MCP servers, and container orchestration. Currently pursuing WGU Cloud and Network Engineering."
  
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Crow0077"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/xhuljanocaushllari"

  [[params.socialIcons]]
    name = "mail"
    url = "mailto:xcaushlari@gmail.com"

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    codeFences = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 10
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 15
  [[menu.main]]
    identifier = "tags"
    name = "Tags"

baseURL = "https://crow0077.github.io/xhuljano-tech-blog/"
languageCode = "en-us"
title = "Xhuljano"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false

[params]
  env = "production"
  description = "Cloud engineering student building with AI agents, MCP servers, and RKE2 Kubernetes homelab infrastructure."
  author = "Xhuljano"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  
  [params.homeInfoParams]
    Title = "Building with AI Agents"
    Content = "Cloud engineering student building real infrastructure — 56-pod RKE2 K8s cluster, 8 MCP servers (60+ tools), Blender 3D + AI pipeline, autonomous security auditing. CompTIA A+ certified. Building toward AI Platform Engineer."
  
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Crow0077"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/xhuljano-caushllari-125076157/"

  [[params.socialIcons]]
    name = "mail"
    url = "mailto:xcaushlari@gmail.com"

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    codeFences = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

